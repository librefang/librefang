# Claude Flow V3 Runtime Configuration — LibreFang
# Swarm topology for multi-agent orchestration

version: "3.0.0"

swarm:
  topology: hierarchical-mesh
  maxAgents: 12
  autoScale: true
  coordinationStrategy: consensus
  # Workflow: AQE → Coder → Tester → Reviewer → Validator

memory:
  backend: hybrid
  enableHNSW: true
  persistPath: .claude-flow/data
  cacheSize: 100
  # ADR-049: Self-Learning Memory
  learningBridge:
    enabled: true
    sonaMode: balanced
    confidenceDecayRate: 0.005
    accessBoostAmount: 0.03
    consolidationThreshold: 10
  memoryGraph:
    enabled: true
    pageRankDamping: 0.85
    maxNodes: 5000
    similarityThreshold: 0.8
  agentScopes:
    enabled: true
    defaultScope: project

neural:
  enabled: true
  modelPath: .claude-flow/neural

hooks:
  enabled: true
  autoExecute: true

mcp:
  autoStart: false
  port: 3000
