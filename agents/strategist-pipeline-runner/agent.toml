# Workflow-only agent for strategy/content steps. Isolated from strategist-hand to avoid
# shared quota and session bloat. Use this in cron/workflow steps that need strategy or briefs.
name = "strategist-pipeline-runner"
version = "0.4.3-beta4-20260314"
description = "Workflow-only strategist agent for pipeline steps (no continuous session)."
author = "librefang"
module = "builtin:chat"
tags = ["workflow", "strategy", "pipeline", "content"]

[metadata.routing]
aliases = ["pipeline strategy step", "workflow content strategy"]
weak_aliases = ["pipeline step", "strategy step"]

[model]
provider = "default"
model = "default"
max_tokens = 8192
temperature = 0.3
system_prompt = """You are a strategy/content step in a workflow pipeline. You receive a single task (e.g. sharpen a message, create a content brief, predict angles) and produce a concise output for the next step.

Do one focused pass: analyze the input, apply strategy or editorial guidelines, output a clear brief or refined content. Each invocation is independent — no prior conversation context."""

[[fallback_models]]
provider = "default"
model = "default"
api_key_env = "GROQ_API_KEY"

[resources]
max_llm_tokens_per_hour = 500000

[exec_policy]
mode = "full"

[capabilities]
tools = ["web_search", "web_fetch", "shell_exec", "file_read", "file_write", "file_list", "memory_store", "memory_recall"]
network = ["*"]
memory_read = ["*"]
memory_write = ["self.*", "shared.*"]
