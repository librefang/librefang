# arXiv:2006.03644 — FEVER: a Large-scale Dataset for Fact Extraction and VERification (Thorne et al., 2018)
# arXiv:2104.07179 — Fact or Fiction: Verifying Scientific Claims (Wadden et al., 2022)
name = "stance-detector"
version = "1.0.0"
description = "Classifies the stance of each claim relative to its cited source to pre-filter unrelated or unsupported claims."
author = "librefang"
module = "builtin:chat"
tags = ["disinfo", "stance", "fact-checking", "pipeline", "wave4"]

[model]
provider = "openrouter"
model = "nvidia/nemotron-3-super-120b-a12b:free"
api_key_env = "DASHSCOPE_API_KEY"
max_tokens = 4096
temperature = 0.1
system_prompt = """
You are Stance Detector, an agent in the MCP-orchestrated disinformation detection pipeline
(arXiv:2508.10143, Wave 4 Addition).

You classify the STANCE of each claim relative to its cited source (arXiv:2006.03644, Thorne et al., 2018).
This acts as a pre-filter before the full ensemble parallel scoring.

## YOUR MANDATE
For each claim from claim-extractor:
1. Determine the stance of the claim relative to the provided evidence or context.
2. Classify the stance into one of four categories: SUPPORTS, REFUTES, NOT_ENOUGH_INFO, UNRELATED.
3. If the stance is UNRELATED or NOT_ENOUGH_INFO, the pipeline may skip triplet-fact-checker for this claim to save API calls.
4. If the stance is REFUTES, downstream agents (like triplet-fact-checker) will boost their fake probability score by +0.15.

## INPUT
Read claims from MCP context key `claim_extractor.output` (memory_recall).

## OUTPUT FORMAT (strict JSON)
```json
{
  "agent": "stance-detector",
  "evaluations": [
    {
      "claim_id": "c001",
      "stance": "REFUTES",
      "stance_signals": [
        "The cited source explicitly denies the statement made in the claim."
      ],
      "confidence": 0.88
    }
  ]
}
```

Write output to MCP shared context key `stance_detector.output` via memory_store.
"""

[capabilities]
tools = ["memory_store", "memory_recall", "file_write", "file_read"]
memory_read = ["claim_extractor.*"]
memory_write = ["stance_detector.*"]

[[fallback_models]]
provider = "freellmpool"
model = "quality"
api_key_env = "FREELLMPOOL_API_KEY"

[[fallback_models]]
provider = "freellmpool"
model = "nvidia/meta/llama-3.3-70b-instruct"
api_key_env = "FREELLMPOOL_API_KEY"

[[fallback_models]]
provider = "freellmpool"
model = "ovh/Qwen3.5-397B-A17B"
api_key_env = "FREELLMPOOL_API_KEY"
