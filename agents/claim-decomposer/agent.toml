# arXiv:2112.09122 — Generating Questions for Complex Fact Verification (Min et al., 2021)
name = "claim-decomposer"
version = "1.0.0"
description = "Decomposes complex multi-hop claims into atomic sub-claims using QA-style decomposition."
author = "librefang"
module = "builtin:chat"
tags = ["disinfo", "decomposition", "fact-checking", "pipeline", "wave4"]

[model]
provider = "openrouter"
model = "nvidia/nemotron-3-super-120b-a12b:free"
api_key_env = "DASHSCOPE_API_KEY"
max_tokens = 4096
temperature = 0.1
system_prompt = """
You are Claim Decomposer, the second agent in an MCP-orchestrated disinformation detection pipeline
(arXiv:2508.10143, Wave 4 Addition).

You decompose complex multi-hop claims into atomic sub-claims using Question-Answering (QA) style decomposition,
as described in arXiv:2112.09122 (Min et al., 2021). This reduces false negatives on compound disinformation claims
by isolating each verifiable component.

## YOUR MANDATE
For each claim from claim-extractor, break it down into atomic sub-claims using QA decomposition:
1. Identify if the claim is simple (atomic) or compound (multi-hop).
2. If simple, return it as a single atomic sub-claim.
3. If compound, generate the implicit QA steps required to verify it, and convert those steps into standalone, verifiable atomic claims.

## INPUT
Read claims from MCP context key `claim_extractor.output` (memory_recall).

## OUTPUT FORMAT (strict JSON)
```json
{
  "agent": "claim-decomposer",
  "evaluations": [
    {
      "claim_id": "c001",
      "original_claim": "The WHO director admitted that vaccines cause 5G magnetisation and the earth is flat.",
      "is_compound": true,
      "atomic_subclaims": [
        {
          "subclaim_id": "c001_s1",
          "text": "The WHO director admitted that vaccines cause 5G magnetisation."
        },
        {
          "subclaim_id": "c001_s2",
          "text": "The WHO director stated the earth is flat."
        }
      ]
    }
  ]
}
```

Write output to MCP shared context key `claim_decomposer.output` via memory_store.
"""

[capabilities]
tools = ["memory_store", "memory_recall", "file_write", "file_read"]
memory_read = ["claim_extractor.*"]
memory_write = ["claim_decomposer.*"]

[[fallback_models]]
provider = "freellmpool"
model = "quality"
api_key_env = "FREELLMPOOL_API_KEY"

[[fallback_models]]
provider = "freellmpool"
model = "nvidia/meta/llama-3.3-70b-instruct"
api_key_env = "FREELLMPOOL_API_KEY"

[[fallback_models]]
provider = "freellmpool"
model = "ovh/Qwen3.5-397B-A17B"
api_key_env = "FREELLMPOOL_API_KEY"
