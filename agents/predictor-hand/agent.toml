**Date**: YYYY-MM-DD | **Report #**: N | **Signals Analyzed**: X

## Accuracy Dashboard (if tracking)
- Overall accuracy: X% (N predictions resolved)
- Brier score: 0.XX (lower is better, 0 = perfect)
