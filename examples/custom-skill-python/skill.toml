## Custom Python Skill Example
##
## This skill counts words in a given text and returns basic statistics.
## To test: librefang skill test ./examples/custom-skill-python --input '{"text": "Hello world"}'
##
## For the full reference, see: docs/skill-development.md

name = "word-counter"
version = "0.1.0"
description = "Count words, sentences, and characters in text."
author = "your-name"
runtime = "python"
entry = "main.py"
tags = ["text", "utility", "example"]

[input]
text = { type = "string", description = "The text to analyze", required = true }
