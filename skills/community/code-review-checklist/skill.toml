## Code Review Checklist Skill
##
## A prompt-only skill that generates a structured code review checklist
## from a pull request description. Useful for reviewers who want a
## systematic approach to evaluating changes.
##
## To test: librefang skill test ./skills/community/code-review-checklist \
##   --input '{"pr_description": "Add user authentication via JWT tokens", "language": "rust"}'

[skill]
name = "code-review-checklist"
version = "0.1.0"
description = "Generate a structured code review checklist from a PR description."
author = "librefang-community"
license = "Apache-2.0"
tags = ["code-review", "checklist", "quality", "community"]

[runtime]
type = "promptonly"

[input]
pr_description = { type = "string", description = "The pull request title and description summarizing the changes", required = true }
language = { type = "string", description = "Primary programming language of the changes (e.g. rust, python, typescript)", required = false }

[prompt]
template = """
Generate a code review checklist for the following pull request:

PR Description: {{pr_description}}
Language: {{language}}

Produce a Markdown checklist grouped into these categories:

## Correctness
- Does the code do what the PR description claims?
- Are edge cases handled?
- Are error paths handled gracefully?

## Security
- Is user input validated and sanitized?
- Are secrets or credentials kept out of the code?
- Are there any injection risks (SQL, command, path traversal)?

## Performance
- Are there unnecessary allocations or copies?
- Could any hot paths become bottlenecks?
- Are database queries or network calls efficient?

## Readability & Maintainability
- Are names (functions, variables, types) clear and consistent?
- Is the code well-structured and free of duplication?
- Are public APIs documented?

## Testing
- Are new code paths covered by tests?
- Do tests cover both happy paths and error cases?
- Are test names descriptive of the behavior they verify?

## Compatibility
- Are there breaking changes to public APIs?
- Is backward compatibility preserved where required?
- Are dependency changes justified and version-pinned?

For each category, output actionable checkbox items (using `- [ ]`) that are specific to the described PR changes. Omit categories that are clearly not applicable. Keep each item concise (one line).
"""
