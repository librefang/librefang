# cargo-deny configuration — supply-chain audit for the LibreFang workspace.
#
# Schema reference: https://embarkstudios.github.io/cargo-deny/checks/cfg.html
#
# Run locally with:
#   cargo deny check advisories
#   cargo deny check bans licenses sources
#
# CI runs the same checks on every PR and main push that touches Cargo.toml,
# Cargo.lock, deny.toml, or the workflow itself — see
# .github/workflows/cargo-deny.yml. See CONTRIBUTING.md (§ Dependency policy)
# for the review expectations behind every entry below.

[graph]
# Resolve the dependency graph for every platform we ship to. A crate that
# only compiles on a single target (e.g. windows-only or wasm-only) will
# otherwise be skipped silently and we'd miss license/advisory hits on the
# platforms our users actually run.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

[output]
feature-depth = 1

# ─────────────────────────────────────────────────────────────────────────────
# Advisories — RustSec database, blocks yanked / vulnerable crates.
# ─────────────────────────────────────────────────────────────────────────────
[advisories]
# https://embarkstudios.github.io/cargo-deny/checks/advisories/cfg.html
db-path = "$CARGO_HOME/advisory-dbs"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "deny"
# Each ignore entry links to the upstream advisory and (when applicable) is
# scoped to the exact crate@version pulling it in, so a fresh occurrence in
# a different dependency path will still fail the audit.
ignore = [
    # ── gtk-rs GTK3 bindings, unmaintained ─────────────────────────────────
    # Transitive via tauri-runtime-wry on Linux only. Cannot upgrade until
    # tauri migrates to GTK4 — track upstream: https://github.com/tauri-apps/tauri/issues/9220
    { id = "RUSTSEC-2024-0411", reason = "gtk unmaintained; transitive via tauri on Linux. https://rustsec.org/advisories/RUSTSEC-2024-0411" },
    { id = "RUSTSEC-2024-0412", reason = "gtk-sys unmaintained; transitive via tauri on Linux. https://rustsec.org/advisories/RUSTSEC-2024-0412" },
    { id = "RUSTSEC-2024-0413", reason = "atk unmaintained; transitive via tauri on Linux. https://rustsec.org/advisories/RUSTSEC-2024-0413" },
    { id = "RUSTSEC-2024-0414", reason = "atk-sys unmaintained; transitive via tauri on Linux. https://rustsec.org/advisories/RUSTSEC-2024-0414" },
    { id = "RUSTSEC-2024-0415", reason = "gdk unmaintained; transitive via tauri on Linux. https://rustsec.org/advisories/RUSTSEC-2024-0415" },
    { id = "RUSTSEC-2024-0416", reason = "gdk-sys unmaintained; transitive via tauri on Linux. https://rustsec.org/advisories/RUSTSEC-2024-0416" },
    { id = "RUSTSEC-2024-0417", reason = "gdkx11 unmaintained; transitive via tauri on Linux. https://rustsec.org/advisories/RUSTSEC-2024-0417" },
    { id = "RUSTSEC-2024-0418", reason = "gdkx11-sys unmaintained; transitive via tauri on Linux. https://rustsec.org/advisories/RUSTSEC-2024-0418" },
    { id = "RUSTSEC-2024-0419", reason = "gdkwayland-sys unmaintained; transitive via tauri on Linux. https://rustsec.org/advisories/RUSTSEC-2024-0419" },
    { id = "RUSTSEC-2024-0420", reason = "gdk-pixbuf unmaintained; transitive via tauri on Linux. https://rustsec.org/advisories/RUSTSEC-2024-0420" },

    # ── Other unmaintained transitive crates ───────────────────────────────
    { id = "RUSTSEC-2023-0071", reason = "rsa Marvin attack; transitive, no upstream fix yet. https://rustsec.org/advisories/RUSTSEC-2023-0071" },
    { id = "RUSTSEC-2024-0370", reason = "proc-macro-error unmaintained; transitive. https://rustsec.org/advisories/RUSTSEC-2024-0370" },
    { id = "RUSTSEC-2025-0057", reason = "fxhash unmaintained; transitive. https://rustsec.org/advisories/RUSTSEC-2025-0057" },
    { id = "RUSTSEC-2025-0075", reason = "unic-* unmaintained (kuchikiki/selectors chain). https://rustsec.org/advisories/RUSTSEC-2025-0075" },
    { id = "RUSTSEC-2025-0080", reason = "unic-* unmaintained (kuchikiki/selectors chain). https://rustsec.org/advisories/RUSTSEC-2025-0080" },
    { id = "RUSTSEC-2025-0081", reason = "unic-* unmaintained (kuchikiki/selectors chain). https://rustsec.org/advisories/RUSTSEC-2025-0081" },
    { id = "RUSTSEC-2025-0098", reason = "unic-* unmaintained (kuchikiki/selectors chain). https://rustsec.org/advisories/RUSTSEC-2025-0098" },
    { id = "RUSTSEC-2025-0100", reason = "unic-* unmaintained (kuchikiki/selectors chain). https://rustsec.org/advisories/RUSTSEC-2025-0100" },
    { id = "RUSTSEC-2025-0141", reason = "bincode 2.0.x unmaintained; transitive via the 2026-06-17 upstream dep bumps. https://rustsec.org/advisories/RUSTSEC-2025-0141" },
]
# Note: RUSTSEC-2025-0134 (rustls-pemfile unmaintained) was removed — the
# crate was dropped from the dependency tree by an upstream dep bump and the
# ignore entry would otherwise cause cargo-deny to fail with "no crate matched".

# ─────────────────────────────────────────────────────────────────────────────
# Licenses — explicit allow-list. Anything not listed fails the check.
# ─────────────────────────────────────────────────────────────────────────────
[licenses]
# https://embarkstudios.github.io/cargo-deny/checks/licenses/cfg.html
confidence-threshold = 0.8
# Permissive licenses compatible with our own Apache-2.0 / MIT distribution.
# Strong copyleft (GPL, AGPL, LGPL) is intentionally absent — adding one
# requires a maintainer-level decision documented in CONTRIBUTING.md.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",            # MIT Zero Attribution (borrow-or-share); subset of MIT, more permissive
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "BSL-1.0",          # Boost Software License 1.0 (xxhash-rust); permissive, OSI-approved
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "Zlib",
    "CC0-1.0",
    "Unlicense",        # Public domain (ext-sort); effectively CC0 equivalent
    # CDLA-Permissive-2.0 is used by webpki-roots; OSI-approved permissive
    # license compatible with our distribution model.
    "CDLA-Permissive-2.0",
]
# Per-crate license clarifications go here. Add only when SPDX detection is
# ambiguous AND the upstream LICENSE file has been read manually.
exceptions = [
    # surrealdb-protocol uses BUSL-1.1 (Business Source License 1.1 — converts to
    # Apache-2.0 after 4 years). Required as a transitive dep of surrealdb 3.0.5
    # which BossFang pins as the primary storage backend. The BUSL grants unlimited
    # non-production use and production use below 100 nodes; BossFang's use fits
    # both criteria. Review at next surrealdb major version bump.
    { allow = ["BUSL-1.1"], name = "surrealdb-protocol" },
]

# `ring` ships a hand-rolled license file rather than a single SPDX ID;
# this clarification matches the upstream reality (MIT + ISC + OpenSSL).
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# `libbz2-rs-sys` declares a non-SPDX license field ("bzip2-1.0.6"). The bzip2
# license is a BSD-2-Clause variant with identical terms; this clarification maps
# it to the nearest SPDX identifier. Hash verified against libbz2-rs-sys 0.2.5.
[[licenses.clarify]]
name = "libbz2-rs-sys"
expression = "BSD-2-Clause"
license-files = [{ path = "LICENSE", hash = 0xd0588441 }]


# ─────────────────────────────────────────────────────────────────────────────
# Bans — duplicate-version, wildcard, and explicit deny / allow lists.
# ─────────────────────────────────────────────────────────────────────────────
[bans]
# https://embarkstudios.github.io/cargo-deny/checks/bans/cfg.html
# Workspace currently has many dependencies that legitimately pull in
# different minor versions of shared crates (e.g. tokio-util, hashbrown).
# `warn` flags them in CI logs without failing the build; we revisit the
# duplicate count as part of routine dependency review rather than blocking
# unrelated PRs on a transitive bump. Promote to "deny" once the workspace
# is consolidated.
multiple-versions = "warn"
# Wildcard version requirements (`*`) cannot be reproducibly resolved and
# are always a mistake in a published crate. Workspace-internal crates
# however depend on each other via `path = "..."` only, which cargo-deny
# treats as `*` — those are safe and explicitly allowed.
# Workspace-internal crates depend on each other via `path = "..."` only.
# cargo-deny treats those as wildcard requirements (`*`). The
# `allow-wildcard-paths = true` knob is meant to cover this, but the
# action's cargo-deny version still flags every internal crate because
# they declare a `version = "..."` field (which makes them "public" from
# its perspective even though they're never published to crates.io).
# Downgrade to `warn` so wildcards are visible in the log without
# breaking CI; tighten back to `deny` once cargo-deny grows a "private
# workspace" exception or we drop internal version pins.
wildcards = "warn"
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = [
    # `zip` 4.x is pulled in by tauri-plugin-updater (transitive) while our
    # own code uses 8.x. Allow the duplicate until tauri upstream catches up.
    { name = "zip" },
]
skip-tree = []

# ─────────────────────────────────────────────────────────────────────────────
# Sources — restrict where crates may come from.
# ─────────────────────────────────────────────────────────────────────────────
[sources]
# https://embarkstudios.github.io/cargo-deny/checks/sources/cfg.html
# Anything outside crates.io must be explicitly allow-listed. Each entry below
# links to the upstream issue / PR explaining why a published crates.io version
# is not yet usable or why the fork is required.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    # ── BossFang-exclusive git deps ────────────────────────────────────────────
    # liter-llm: unified LLM router used by UAR driver; no stable crates.io
    # release yet (rc versioning). GQAdonis/liter-llm is the BossFang fork.
    "https://github.com/GQAdonis/liter-llm.git",

    # universal-agent-runtime: UAR provider giving access to 142+ LLM providers.
    # BossFang uses GQAdonis fork which pins surreal-backend for surrealdb 3.x
    # compatibility. No published crates.io release.
    "https://github.com/GQAdonis/universal-agent-runtime.git",

    # kreuzberg: document parsing library pulled in transitively via
    # universal-agent-runtime. Public repo; SSH URL is in Cargo.lock because it
    # is fetched via SSH upstream — a .cargo/config.toml source-replacement
    # redirects to HTTPS for CI runners without SSH key access.
    "ssh://git@github.com/GQAdonis/kreuzberg.git",

    # surreal-memory: SurrealDB-native memory substrate (semantic search,
    # knowledge graphs, task tracking). No crates.io release; embedded feature
    # required (no external SurrealDB service dependency).
    "https://github.com/Prometheus-AGS/surreal-memory-server",

    # prometheus-parking-lot: BossFang fork of parking-lot patched for
    # SurrealDB 3.x lock-poisoning semantics. Required until parking-lot
    # upstream releases a compatible version.
    "https://github.com/Prometheus-AGS/prometheus-parking-lot-rs",

    # ── Upstream git deps (from librefang/librefang) ───────────────────────────
    # modelcontextprotocol/rust-sdk: official MCP Rust SDK. Used at a specific
    # git rev because the release cadence lags the protocol spec; upstream
    # tracks the rev that matches the supported MCP protocol version.
    "https://github.com/modelcontextprotocol/rust-sdk",

    # sycophancy-correction-skill: sycophancy-detection skill pulled in via the
    # upstream skills system. MIT licensed; no crates.io release yet.
    "https://github.com/Know-Me-Tools/sycophancy-correction-skill.git",
]
