name: "Release / LTS Branch"

# When a .0-lts tag is pushed (e.g. v2026.3.0-lts), automatically create
# a release/ branch for long-term maintenance. Patches are cherry-picked
# to this branch and tagged as v2026.3.1-lts, v2026.3.2-lts, etc.
#
# Version scheme: YYYY.M.PATCH-lts
#   v2026.3.0-lts  → initial LTS, creates release/2026.3
#   v2026.3.1-lts  → patch 1 on release/2026.3
#   v2026.3.2-lts  → patch 2

on:
  push:
    tags:
      - "v*-lts"

permissions:
  contents: write

jobs:
  create_lts_branch:
    name: Create LTS Branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create release branch (only for .0-lts)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Extract: v2026.3.0-lts -> 2026.3.0
          BASE="${TAG#v}"
          BASE="${BASE%-lts}"
          # YYYY.M from YYYY.M.PATCH
          YEAR_MONTH="$(echo "$BASE" | cut -d. -f1,2)"
          PATCH="$(echo "$BASE" | cut -d. -f3)"
          BRANCH="release/$YEAR_MONTH"

          # Only create branch for patch 0 (initial LTS)
          if [ "$PATCH" != "0" ]; then
            echo "Patch tag ($TAG), branch $BRANCH should already exist"
            exit 0
          fi

          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Branch $BRANCH already exists, skipping"
          else
            echo "Creating LTS branch: $BRANCH from $TAG"
            git checkout -b "$BRANCH" "$TAG"
            git push origin "$BRANCH"
            echo "✓ Created $BRANCH"
          fi

          # Protect the branch
          gh api repos/${{ github.repository }}/branches/$BRANCH/protection \
            -X PUT \
            -f "required_pull_request_reviews[dismiss_stale_reviews]=true" \
            -f "required_pull_request_reviews[required_approving_review_count]=1" \
            -f "enforce_admins=false" \
            -f "restrictions=null" \
            -f "required_status_checks=null" \
            2>/dev/null || echo "::warning::Could not set branch protection (may need admin token)"
