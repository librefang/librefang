name: Issue Inactive Check

on:
  schedule:
    - cron: '0 8 * * 3'  # Every Wednesday 08:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Remind inactive assigned issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          CUTOFF=$(date -u -d '14 days ago' +%Y-%m-%dT00:00:00Z 2>/dev/null || date -u -v-14d +%Y-%m-%dT00:00:00Z)

          # Find assigned issues with no activity for 14 days
          gh issue list --repo $REPO --state open --assignee '@me' --json number,title,updatedAt,assignees --limit 100 2>/dev/null || true

          gh api "repos/$REPO/issues?state=open&per_page=100&since=2000-01-01T00:00:00Z" --jq '
            .[] | select(.assignees | length > 0) | select(.pull_request == null) |
            {number, title, updated_at, assignee: .assignees[0].login}
          ' 2>/dev/null | while read -r line; do
            NUMBER=$(echo "$line" | jq -r '.number')
            UPDATED=$(echo "$line" | jq -r '.updated_at')
            ASSIGNEE=$(echo "$line" | jq -r '.assignee')

            if [ "$UPDATED" \< "$CUTOFF" ]; then
              gh issue comment "$NUMBER" --repo "$REPO" \
                --body "👋 @$ASSIGNEE This issue has been assigned for 14+ days without activity. Still working on it? If not, comment \`/unclaim\` so others can pick it up."
            fi
          done
