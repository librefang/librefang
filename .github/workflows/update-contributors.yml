name: Update Contributors & Star History

on:
  push:
    branches: [main]
    paths-ignore:
      - 'web/public/assets/contributors.svg'
      - 'web/public/assets/star-history.svg'
  schedule:
    - cron: "0 * * * *"  # Hourly
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  update:
    name: Refresh contributors and star history
    if: github.repository == 'librefang/librefang'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Generate contributors SVG
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/generate_contributors.py librefang/librefang web/public/assets/contributors.svg

      - name: Generate star history SVG
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/generate_star_history.py librefang/librefang web/public/assets/star-history.svg

      - name: Create PR with updated SVGs
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/update-contributors-star-history
          commit-message: "docs: update contributors and star history"
          title: "docs: update contributors and star history"
          delete-branch: true

      - name: Auto-merge PR
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --delete-branch
