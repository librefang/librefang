name: Update Contributors & Star History

on:
  schedule:
    - cron: "0 8 * * *"  # Daily 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  update:
    name: Refresh contributors and star history
    if: github.repository == 'librefang/librefang'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695b09a97c4c # stable 2025-01-13

      - name: Generate contributors and star history SVGs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: cargo xtask contributors --repo librefang/librefang

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR with updated SVGs
        if: steps.diff.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@67ccf781d68cd99b580ae25a5c18a1cc84ffff1f # v7.0.6
        with:
          branch: chore/update-contributors-star-history
          commit-message: "docs: update contributors and star history"
          title: "docs: update contributors and star history"
          delete-branch: true

      - name: Auto-merge PR
        if: steps.diff.outputs.changed == 'true' && steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_REPO_TOKEN }}
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --delete-branch --admin
