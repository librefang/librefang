name: Update Contributors

on:
  workflow_dispatch:
  schedule:
    - cron: "37 0 * * *"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  update:
    name: Refresh contributors
    if: github.repository == 'librefang/librefang'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}

      - name: Generate contributors list
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_REPO_TOKEN }}
        run: |
          # Fetch human contributors sorted by contribution count
          USERS=$(gh api repos/librefang/librefang/contributors \
            --jq '[.[] | select(.type == "User")] | sort_by(-.contributions) | .[].login')

          # Build HTML lines
          HTML=""
          for user in $USERS; do
            HTML="${HTML}<a href=\"https://github.com/${user}\"><img src=\"https://github.com/${user}.png\" width=\"50\" height=\"50\" alt=\"${user}\" /></a>"$'\n'
          done

          # Replace between markers in README
          awk -v html="$HTML" '
            /<!-- CONTRIBUTORS-START -->/ { print; printf "%s", html; skip=1; next }
            /<!-- CONTRIBUTORS-END -->/ { skip=0 }
            !skip { print }
          ' README.md > README.tmp && mv README.tmp README.md

      - name: Create PR with updated contributors
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          branch: chore/update-contributors
          commit-message: "docs: update contributors list"
          title: "docs: update contributors list"
          delete-branch: true

      - name: Auto-merge PR
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_REPO_TOKEN }}
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --delete-branch
