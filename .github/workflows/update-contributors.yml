name: Update Contributors

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/assets/contributors.svg'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  update:
    name: Refresh contributors
    if: github.repository == 'librefang/librefang'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}

      - name: Generate contributors SVG
        run: |
          # Force contrib.rocks to rebuild cache
          curl -sf "https://contrib.rocks/preview?repo=librefang%2Flibrefang" > /dev/null 2>&1 || true
          sleep 5
          # Download fresh SVG (圆形头像)
          curl -sfL "https://contrib.rocks/image?repo=librefang/librefang&max=100&columns=12" \
            -o public/assets/contributors.svg

      - name: Create PR with updated SVG
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          branch: chore/update-contributors
          commit-message: "docs: update contributors"
          title: "docs: update contributors"
          delete-branch: true

      - name: Auto-merge PR
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_REPO_TOKEN }}
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --delete-branch
