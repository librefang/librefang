name: Deploy Workers

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "deploy/worker/**"
      - "web/workers/github-stats-worker/**"

permissions:
  contents: read

jobs:
  deploy-worker:
    name: Deploy Main Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@1d0ff469b4a3d2c20e03e3b6cb4b1f99be72946e # v4.2.0
        with:
          node-version: "24"

      - name: Deploy Worker
        working-directory: deploy/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 deploy

  deploy-github-stats:
    name: Deploy GitHub Stats Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@1d0ff469b4a3d2c20e03e3b6cb4b1f99be72946e # v4.2.0
        with:
          node-version: "24"

      - name: Deploy GitHub Stats Worker
        working-directory: web/workers/github-stats-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 deploy
