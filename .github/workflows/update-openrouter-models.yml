name: Update OpenRouter Model Snapshot

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  update:
    name: Refresh OpenRouter model snapshot
    if: github.repository == 'librefang/librefang'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Download deterministic snapshot
        run: |
          curl --fail --retry 3 --silent --show-error \
            https://openrouter.ai/api/v1/models \
            | jq -c '{data: [.data[] | {id, name, context_length, architecture, supported_parameters, top_provider, pricing}]}' \
            > crates/librefang-runtime/openrouter-models.snapshot.json

      - name: Create update PR
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          # Create the PR with a PAT, not the default GITHUB_TOKEN.
          # Branch pushes made by GITHUB_TOKEN do not trigger `on: pull_request` workflows (GitHub's recursion guard), so CI — and the required "CI Gate" status check — would never run on this PR, leaving it permanently unmergeable.
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          branch: chore/update-openrouter-model-snapshot
          commit-message: "chore(openrouter): update model snapshot"
          title: "chore(openrouter): update model snapshot"
          body: |
            Updates the checked-in OpenRouter model snapshot used as the offline fallback.

            The runtime live catalog remains authoritative when OpenRouter is configured.
          delete-branch: true

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_REPO_TOKEN }}
        # The `main` ruleset requires the "CI Gate" check and has an empty bypass_actors list, so `--admin` cannot force the merge — it fails with "Required status check 'CI Gate' is expected" while CI is still pending.
        # Enable auto-merge instead; GitHub squash-merges the PR on its own once CI Gate passes (0 approvals are required).
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --delete-branch --auto
