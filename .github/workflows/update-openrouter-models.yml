name: Update OpenRouter Model Snapshot

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  update:
    name: Refresh OpenRouter model snapshot
    if: github.repository == 'librefang/librefang'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download deterministic snapshot
        run: |
          curl --fail --retry 3 --silent --show-error \
            https://openrouter.ai/api/v1/models \
            | jq -c '{data: [.data[] | {id, name, context_length, architecture, supported_parameters, top_provider, pricing}]}' \
            > crates/librefang-runtime/openrouter-models.snapshot.json

      - name: Create update PR
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          branch: chore/update-openrouter-model-snapshot
          commit-message: "chore(openrouter): update model snapshot"
          title: "chore(openrouter): update model snapshot"
          body: |
            Updates the checked-in OpenRouter model snapshot used as the offline fallback.

            The runtime live catalog remains authoritative when OpenRouter is configured.
          delete-branch: true

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_REPO_TOKEN }}
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --delete-branch --auto
