name: "Release / Docker"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  # ── Wait for the GitHub Release to be created ────────────────────────────
  wait_for_release:
    name: Wait for Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Wait for release or create fallback
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          for i in $(seq 1 12); do
            if gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
              echo "✓ Release $TAG found"
              exit 0
            fi
            echo "Waiting for release $TAG to be created... ($i/12)"
            sleep 5
          done

          # Fallback: create a minimal release so builds can proceed
          echo "::warning::Release not found after 60s, creating fallback release"
          VERSION="${TAG#v}"
          VERSION="${VERSION%-*}"
          CHANGES=$(awk '/^## \['"$VERSION"'\]/{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md)
          if [ -z "$CHANGES" ]; then
            CHANGES="See [CHANGELOG](https://github.com/librefang/librefang/blob/main/CHANGELOG.md) for details."
          fi
          gh release create "$TAG" \
            --title "LibreFang $TAG" \
            --notes "$CHANGES" \
            --repo "${{ github.repository }}" || true

  # ── Docker (linux/amd64 + linux/arm64, native runners) ────────────────────
  docker:
    name: Docker / ${{ matrix.platform }}
    needs: [wait_for_release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            os: ubuntu-24.04
          - platform: linux/arm64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Extract version & platform slug
        id: meta
        run: |
          echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          platform=${{ matrix.platform }}
          echo "slug=${platform//\//-}" >> "$GITHUB_OUTPUT"
      - name: Build and push (single-arch digest)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/librefang/librefang
          cache-from: type=gha,scope=${{ steps.meta.outputs.slug }}
          cache-to: type=gha,mode=max,scope=${{ steps.meta.outputs.slug }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: docker-digest-${{ steps.meta.outputs.slug }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Docker manifest merge ───────────────────────────────────────────────
  docker-manifest:
    name: Docker Manifest
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: docker-digest-*
          merge-multiple: true
      - name: Create and push multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          IMAGE=ghcr.io/librefang/librefang
          VERSION=${{ steps.version.outputs.version }}
          docker buildx imagetools create \
            -t "$IMAGE:latest" \
            -t "$IMAGE:$VERSION" \
            $(printf "$IMAGE@sha256:%s " *)

  # ── Deploy to Fly.io ────────────────────────────────────────────────────
  deploy_fly:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [docker-manifest]
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1
      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ── Deploy to Render ──────────────────────────────────────────────────
  deploy_render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [docker-manifest]
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "No Render deploy hook configured, skipping"
            exit 0
          fi
          curl -sf "$RENDER_DEPLOY_HOOK_URL"
