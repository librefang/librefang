name: "Release / Shell"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Wait for the GitHub Release to be created ────────────────────────────
  wait_for_release:
    name: Wait for Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Wait for release or create fallback
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          for i in $(seq 1 12); do
            if gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
              echo "✓ Release $TAG found"
              exit 0
            fi
            echo "Waiting for release $TAG to be created... ($i/12)"
            sleep 5
          done

          # Fallback: create a minimal release so builds can proceed
          echo "::warning::Release not found after 60s, creating fallback release"
          VERSION="${TAG#v}"
          VERSION="${VERSION%-*}"
          CHANGES=$(awk '/^## \['"$VERSION"'\]/{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md)
          if [ -z "$CHANGES" ]; then
            CHANGES="See [CHANGELOG](https://github.com/librefang/librefang/blob/main/CHANGELOG.md) for details."
          fi
          gh release create "$TAG" \
            --title "LibreFang $TAG" \
            --notes "$CHANGES" \
            --repo "${{ github.repository }}" || true

  # ── CLI Binary (macOS) ────────────────────────────────────────────────────
  cli_mac:
    name: CLI / ${{ matrix.target }}
    needs: [wait_for_release]
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
          - target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}-${{ github.ref_name }}
      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} --bin librefang
      - name: Ad-hoc codesign
        run: |
          xattr -cr target/${{ matrix.target }}/release/librefang || true
          codesign --force --sign - target/${{ matrix.target }}/release/librefang
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../librefang-${{ matrix.target }}.tar.gz librefang
          cd ../../..
          shasum -a 256 librefang-${{ matrix.target }}.tar.gz > librefang-${{ matrix.target }}.tar.gz.sha256
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF#refs/tags/}" librefang-${{ matrix.target }}.* --clobber

  # ── CLI Binary (Linux) ──────────────────────────────────────────────────
  cli_linux:
    name: CLI / ${{ matrix.target }}
    needs: [wait_for_release]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            use_cross: true

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}-${{ github.ref_name }}
      - name: Build CLI
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin librefang
          else
            cargo build --release --target ${{ matrix.target }} --bin librefang
          fi
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../librefang-${{ matrix.target }}.tar.gz librefang
          cd ../../..
          sha256sum librefang-${{ matrix.target }}.tar.gz > librefang-${{ matrix.target }}.tar.gz.sha256
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF#refs/tags/}" librefang-${{ matrix.target }}.* --clobber

  # ── CLI Binary (Linux) - Mini (12 channels) ───────────────────────────────
  cli_linux_mini:
    name: CLI / ${{ matrix.target }} (mini)
    needs: [wait_for_release]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-mini-${{ matrix.target }}-${{ github.ref_name }}
      - name: Build CLI (mini)
        run: cargo build --release --target ${{ matrix.target }} --bin librefang --no-default-features --features mini
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../librefang-${{ matrix.target }}-mini.tar.gz librefang
          cd ../../..
          sha256sum librefang-${{ matrix.target }}-mini.tar.gz > librefang-${{ matrix.target }}-mini.tar.gz.sha256
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF#refs/tags/}" librefang-${{ matrix.target }}-mini.* --clobber

  # ── CLI Binary (Linux, musl — fully static) ─────────────────────────────
  cli_musl:
    name: CLI / ${{ matrix.target }} (static)
    needs: [wait_for_release]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        run: cargo install cross --locked
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}-${{ github.ref_name }}
      - name: Build static CLI
        run: cross build --release --target ${{ matrix.target }} --bin librefang
      - name: Verify static linking
        run: |
          file target/${{ matrix.target }}/release/librefang
          # ldd exits non-zero for static binaries ("not a dynamic executable").
          # Works for both native and cross-compiled ELFs.
          if ldd target/${{ matrix.target }}/release/librefang 2>&1 | grep -q "dynamic"; then
            echo "::error::Binary is dynamically linked!"
            exit 1
          fi
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../librefang-${{ matrix.target }}.tar.gz librefang
          cd ../../..
          sha256sum librefang-${{ matrix.target }}.tar.gz > librefang-${{ matrix.target }}.tar.gz.sha256
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF#refs/tags/}" librefang-${{ matrix.target }}.* --clobber

  # ── CLI Binary (Windows) ────────────────────────────────────────────────
  cli_windows:
    name: CLI / ${{ matrix.target }}
    needs: [wait_for_release]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
          - target: aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}-${{ github.ref_name }}
      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} --bin librefang
      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/librefang.exe" -DestinationPath "librefang-${{ matrix.target }}.zip"
          $hash = (Get-FileHash "librefang-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  librefang-${{ matrix.target }}.zip" | Out-File -Encoding ASCII "librefang-${{ matrix.target }}.zip.sha256"
      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF#refs/tags/}" librefang-${{ matrix.target }}.* --clobber

  # ── CLI Binary (macOS) - Mini ─────────────────────────────────────────────
  cli_mac_mini:
    name: CLI / ${{ matrix.target }} (mini)
    needs: [wait_for_release]
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-mini-${{ matrix.target }}-${{ github.ref_name }}
      - name: Build CLI (mini)
        run: cargo build --release --target ${{ matrix.target }} --bin librefang --no-default-features --features mini
      - name: Ad-hoc codesign
        run: |
          xattr -cr target/${{ matrix.target }}/release/librefang || true
          codesign --force --sign - target/${{ matrix.target }}/release/librefang
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../librefang-${{ matrix.target }}-mini.tar.gz librefang
          cd ../../..
          shasum -a 256 librefang-${{ matrix.target }}-mini.tar.gz > librefang-${{ matrix.target }}-mini.tar.gz.sha256
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF#refs/tags/}" librefang-${{ matrix.target }}-mini.* --clobber

  # ── CLI Binary (Windows) - Mini ───────────────────────────────────────────
  cli_windows_mini:
    name: CLI / ${{ matrix.target }} (mini)
    needs: [wait_for_release]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-mini-${{ matrix.target }}-${{ github.ref_name }}
      - name: Build CLI (mini)
        run: cargo build --release --target ${{ matrix.target }} --bin librefang --no-default-features --features mini
      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/librefang.exe" -DestinationPath "librefang-${{ matrix.target }}-mini.zip"
          $hash = (Get-FileHash "librefang-${{ matrix.target }}-mini.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  librefang-${{ matrix.target }}-mini.zip" | Out-File -Encoding ASCII "librefang-${{ matrix.target }}-mini.zip.sha256"
      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF#refs/tags/}" librefang-${{ matrix.target }}-mini.* --clobber

  # ── Sync to Homebrew Tap ──────────────────────────────────────────────
  sync_homebrew:
    name: Sync to Homebrew Tap
    runs-on: ubuntu-latest
    needs: [cli_mac]
    steps:
      - name: Check out tap repo
        uses: actions/checkout@v6
        with:
          repository: librefang/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Fetch release metadata
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            > release.json

          jq -e '.tag_name and (.assets | type == "array")' release.json >/dev/null

      - name: Generate formula
        run: |
          set -euo pipefail

          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          # Extract semver without date suffix (e.g. 0.5.0-20260316 → 0.5.0)
          SEMVER="${VERSION%-*}"

          asset_url() {
            jq -r --arg name "$1" '.assets[] | select(.name == $name) | .browser_download_url' release.json
          }

          asset_sha() {
            local sha_url
            sha_url="$(jq -r --arg name "${1}.sha256" '.assets[] | select(.name == $name) | .browser_download_url' release.json)"
            if [ -z "$sha_url" ] || [ "$sha_url" = "null" ]; then
              echo "" && return
            fi
            curl -fsSL "$sha_url" | awk '{print $1}'
          }

          asset_size() {
            jq -r --arg name "$1" '.assets[] | select(.name == $name) | .size' release.json
          }

          ARM64_DARWIN_NAME="librefang-aarch64-apple-darwin.tar.gz"
          X86_DARWIN_NAME="librefang-x86_64-apple-darwin.tar.gz"

          ARM64_DARWIN_URL="$(asset_url "$ARM64_DARWIN_NAME")"
          X86_DARWIN_URL="$(asset_url "$X86_DARWIN_NAME")"

          ARM64_DARWIN_SHA="$(asset_sha "$ARM64_DARWIN_NAME")"
          X86_DARWIN_SHA="$(asset_sha "$X86_DARWIN_NAME")"

          ARM64_DARWIN_SIZE="$(asset_size "$ARM64_DARWIN_NAME")"
          X86_DARWIN_SIZE="$(asset_size "$X86_DARWIN_NAME")"

          for required in \
            ARM64_DARWIN_URL X86_DARWIN_URL \
            ARM64_DARWIN_SHA X86_DARWIN_SHA \
            ARM64_DARWIN_SIZE X86_DARWIN_SIZE
          do
            if [ -z "${!required}" ] || [ "${!required}" = "null" ]; then
              echo "Missing release metadata: $required" >&2
              exit 1
            fi
          done

          for size_var in ARM64_DARWIN_SIZE X86_DARWIN_SIZE
          do
            if [ "${!size_var}" -le 0 ]; then
              echo "Release asset is empty: $size_var" >&2
              exit 1
            fi
          done

          # --- Main formula (latest) ---
          cat > tap/Formula/librefang.rb <<EOF
          class Librefang < Formula
            desc "Community-Maintained Agent Operating System written in Rust"
            homepage "https://librefang.ai"
            license "MIT"
            version "$SEMVER"

            depends_on :macos

            if Hardware::CPU.arm?
              url "$ARM64_DARWIN_URL"
              sha256 "$ARM64_DARWIN_SHA"
            else
              url "$X86_DARWIN_URL"
              sha256 "$X86_DARWIN_SHA"
            end

            def install
              bin.install "librefang"
            end

            test do
              system "#{bin}/librefang", "--version"
            end
          end
          EOF

          # --- Versioned formula (e.g. librefang@0.5.0) ---
          # Class name: LibrefangAT050 (@ → AT, dots removed)
          CLASS_SUFFIX=$(echo "$SEMVER" | tr -d '.')
          CLASS_NAME="LibrefangAT${CLASS_SUFFIX}"

          cat > "tap/Formula/librefang@${SEMVER}.rb" <<EOF
          class ${CLASS_NAME} < Formula
            desc "Community-Maintained Agent Operating System written in Rust"
            homepage "https://librefang.ai"
            license "MIT"
            version "$SEMVER"

            depends_on :macos

            if Hardware::CPU.arm?
              url "$ARM64_DARWIN_URL"
              sha256 "$ARM64_DARWIN_SHA"
            else
              url "$X86_DARWIN_URL"
              sha256 "$X86_DARWIN_SHA"
            end

            keg_only :versioned_formula

            def install
              bin.install "librefang"
            end

            test do
              system "#{bin}/librefang", "--version"
            end
          end
          EOF

          echo "=== Main formula ==="
          cat tap/Formula/librefang.rb
          echo ""
          echo "=== Versioned formula: librefang@${SEMVER}.rb ==="
          cat "tap/Formula/librefang@${SEMVER}.rb"

      - name: Commit and push
        working-directory: tap
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "chore: update formula to ${{ github.ref_name }}" || echo "No changes"
          git push

  # ── Sync Installers to Website ─────────────────────────────────────────
  sync_installers:
    name: Sync Installers to Website
    runs-on: ubuntu-latest
    needs: [cli_mac, cli_linux, cli_musl, cli_windows]
    steps:
      - name: Check out source repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          path: source

      - name: Check out website repo
        uses: actions/checkout@v6
        with:
          repository: librefang/librefang-website
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          path: website

      - name: Fetch release metadata
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            > release.json

          jq -e '.tag_name and (.assets | type == "array")' release.json >/dev/null

      - name: Sync install scripts
        run: |
          cp source/scripts/install.sh website/install.sh
          cp source/scripts/install.ps1 website/install.ps1

      - name: Generate install manifest
        env:
          TAG: ${{ github.ref_name }}
        run: |
          jq \
            --arg repo "${{ github.repository }}" \
            --arg tag "$TAG" \
            '
            def artifact_for($target; $ext):
              .assets[]
              | select(.name == ("librefang-" + $target + "." + $ext))
              | {
                  name,
                  target: $target,
                  archive: $ext,
                  url: .browser_download_url,
                  checksum_url: (.browser_download_url + ".sha256")
                };

            {
              repo: $repo,
              version: $tag,
              published_at: .published_at,
              generated_from: ("https://github.com/" + $repo + "/releases/tag/" + $tag),
              channels: {
                stable: $tag
              },
              installers: {
                shell: "/install.sh",
                powershell: "/install.ps1"
              },
              assets: {
                "x86_64-unknown-linux-gnu": artifact_for("x86_64-unknown-linux-gnu"; "tar.gz"),
                "aarch64-unknown-linux-gnu": artifact_for("aarch64-unknown-linux-gnu"; "tar.gz"),
                "x86_64-unknown-linux-musl": artifact_for("x86_64-unknown-linux-musl"; "tar.gz"),
                "aarch64-unknown-linux-musl": artifact_for("aarch64-unknown-linux-musl"; "tar.gz"),
                "x86_64-apple-darwin": artifact_for("x86_64-apple-darwin"; "tar.gz"),
                "aarch64-apple-darwin": artifact_for("aarch64-apple-darwin"; "tar.gz"),
                "x86_64-pc-windows-msvc": artifact_for("x86_64-pc-windows-msvc"; "zip"),
                "aarch64-pc-windows-msvc": artifact_for("aarch64-pc-windows-msvc"; "zip")
              }
            }
            ' release.json > website/install-manifest.json

          cat website/install-manifest.json

      - name: Commit and push
        working-directory: website
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add install.sh install.ps1 install-manifest.json
          git commit -m "chore: sync installers for ${{ github.ref_name }}" || echo "No changes"
          git push
