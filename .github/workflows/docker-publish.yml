name: Docker Publish

# Builds and pushes the BossFang daemon image to GCR on every push to
# main (and on workflow_dispatch for on-demand rebuilds). The image is
# tagged with the short commit SHA and :latest.
#
# Authentication uses Workload Identity Federation — no long-lived SA
# key stored as a secret. The SA (github-actions@prometheus-461323)
# already has roles/storage.admin which covers GCR push.
#
# Private git deps (kreuzberg via universal-agent-runtime) are fetched
# via SSH using a read-only deploy key stored as KREUZBERG_SSH_KEY.
# See k8s/README.md for setup instructions.

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**/Cargo.toml'
      - 'crates/**/src/**'
      - 'crates/librefang-api/dashboard/**'
      - 'deploy/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for WIF token exchange

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: gcr.io/prometheus-461323/bossfang

jobs:
  build-push:
    name: Build & push to GCR
    runs-on: ubuntu-latest
    # Was 60 min; bumped to 120 min after Phase 5–8 added wasmtime,
    # wasmtime-wasi, wasmtime-wasi-http, and wasi-preview1-component-adapter-provider
    # deps which pushed the Rust compile step past the 60-min cap.
    # The last successful build under the 60-min budget was 2026-05-26
    # (image 26fcfa51); PRs #57, #58, #59 all hit the 1h timeout.
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Load the deploy key for the private kreuzberg repo so cargo can
      # fetch it over SSH during the docker build's --mount=type=ssh step.
      # Using inline ssh-agent setup instead of webfactory/ssh-agent to avoid
      # GitHub CDN archive availability issues with that action.
      - name: Load SSH key for private deps
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KREUZBERG_SSH_KEY }}" > ~/.ssh/id_kreuzberg
          chmod 600 ~/.ssh/id_kreuzberg
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/id_kreuzberg
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      # ubuntu-latest ships with docker buildx; just create a named builder
      # so --mount=type=cache works correctly.
      - name: Set up Docker Buildx
        run: docker buildx create --use --name buildkit --driver docker-container

      - name: Authenticate to GCP via Workload Identity Federation
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/400143795490/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
          service_account: github-actions@prometheus-461323.iam.gserviceaccount.com

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and push
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --push \
            --ssh default="$SSH_AUTH_SOCK" \
            --cache-from type=gha,scope=docker-publish \
            --cache-to type=gha,mode=max,scope=docker-publish \
            -t "${{ env.IMAGE }}:${{ github.sha }}" \
            -t "${{ env.IMAGE }}:latest" \
            -f Dockerfile \
            .

      # Configure kubectl for the GKE cluster. Uses the official action rather
      # than `gcloud components install gke-gcloud-auth-plugin`, which FAILS on
      # GitHub runners (gcloud there is apt-managed, not component-managed — the
      # first attempt in PR #65 hit exactly this). get-gke-credentials installs
      # the auth plugin and writes a KUBECONFIG using the WIF identity from the
      # `auth` step above. The CI SA already holds roles/container.developer
      # (container.clusters.get + RBAC to patch Deployments) — no extra IAM.
      - name: Get GKE credentials
        if: github.ref == 'refs/heads/main'
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: client-cluster
          location: us-central1
          project_id: prometheus-461323

      # Roll the running Deployment to the freshly-built image.
      #
      # Surgical `kubectl set image` (NOT `apply -k`): rolls only the container
      # image. Config / SecurityPolicy / StatefulSet changes still go out via
      # `kubectl apply -k k8s/overlays/production-gke` manually (rare) — see
      # k8s/README.md. Image rollout, the common case on every push to main, is
      # now automatic. `rollout status` fails the job loudly if the roll stalls.
      #
      # Guarded to main so a workflow_dispatch from a feature branch can build +
      # push an image for testing without touching production.
      - name: Deploy to GKE
        if: github.ref == 'refs/heads/main'
        run: |
          kubectl set image deployment/bossfang \
            bossfang="${{ env.IMAGE }}:${{ github.sha }}" -n bossfang
          kubectl rollout status deployment/bossfang -n bossfang --timeout=300s
          echo "Deployed ${{ env.IMAGE }}:${{ github.sha }} to bossfang/bossfang"
