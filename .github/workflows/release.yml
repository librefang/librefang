name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Tauri Desktop App (Windows + macOS + Linux) ───────────────────────────
  # Produces: .msi, .exe (Windows) | .dmg, .app (macOS) | .AppImage, .deb (Linux)
  # Also generates and uploads latest.json (the auto-updater manifest)
  desktop:
    name: Desktop / ${{ matrix.platform.name }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux x86_64
            os: ubuntu-22.04
            args: "--target x86_64-unknown-linux-gnu"
            rust_target: x86_64-unknown-linux-gnu

          - name: macOS x86_64
            os: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_target: x86_64-apple-darwin

          - name: macOS ARM64
            os: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin

          - name: Windows x86_64
            os: windows-latest
            args: "--target x86_64-pc-windows-msvc"
            rust_target: x86_64-pc-windows-msvc

          - name: Windows ARM64
            os: windows-latest
            args: "--target aarch64-pc-windows-msvc"
            rust_target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.platform.rust_target }}

      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          if [ -z "$MAC_CERT_BASE64" ]; then
            echo "No certificate configured, skipping..."
            exit 0
          fi
          echo "$MAC_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import $RUNNER_TEMP/certificate.p12 -P "$MAC_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "Using signing identity: $IDENTITY"
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          rm -f $RUNNER_TEMP/certificate.p12

      - name: Build and bundle Tauri desktop app
        if: runner.os != 'macOS' || env.APPLE_SIGNING_IDENTITY == ''
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LibreFang ${{ github.ref_name }}"
          releaseBody: |
            ## What's New

            See the [CHANGELOG](https://github.com/librefang/librefang/blob/main/CHANGELOG.md) for full details.

            ## Installation

            **Desktop App** — Download the installer for your platform below.

            **CLI (Linux/macOS)**:
            ```bash
            curl -fsSL https://librefang.ai/install.sh | sh
            ```

            **Docker**:
            ```bash
            docker pull ghcr.io/librefang/librefang:latest
            ```

            **Coming from OpenClaw?**
            ```bash
            librefang migrate --from openclaw
            ```
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          projectPath: crates/librefang-desktop
          args: ${{ matrix.platform.args }}

      - name: Build and bundle Tauri desktop app (signed macOS)
        if: runner.os == 'macOS' && env.APPLE_SIGNING_IDENTITY != ''
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.MAC_NOTARIZE_APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.MAC_NOTARIZE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.MAC_NOTARIZE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LibreFang ${{ github.ref_name }}"
          releaseBody: |
            ## What's New

            See the [CHANGELOG](https://github.com/librefang/librefang/blob/main/CHANGELOG.md) for full details.

            ## Installation

            **Desktop App** — Download the installer for your platform below.

            **CLI (Linux/macOS)**:
            ```bash
            curl -fsSL https://librefang.ai/install.sh | sh
            ```

            **Docker**:
            ```bash
            docker pull ghcr.io/librefang/librefang:latest
            ```

            **Coming from OpenClaw?**
            ```bash
            librefang migrate --from openclaw
            ```
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          projectPath: crates/librefang-desktop
          args: ${{ matrix.platform.args }}

  # ── CLI Binary (5 platforms) ──────────────────────────────────────────────
  cli:
    name: CLI / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - name: Install cross (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --locked
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}
      - name: Build CLI (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }} --bin librefang
      - name: Build CLI
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }} --bin librefang
      - name: Ad-hoc codesign CLI binary (macOS)
        if: runner.os == 'macOS'
        run: |
          xattr -cr target/${{ matrix.target }}/release/librefang || true
          codesign --force --sign - target/${{ matrix.target }}/release/librefang
      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../librefang-${{ matrix.target }}.tar.gz librefang
          cd ../../..
          sha256sum librefang-${{ matrix.target }}.tar.gz > librefang-${{ matrix.target }}.tar.gz.sha256
      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/librefang.exe" -DestinationPath "librefang-${{ matrix.target }}.zip"
          $hash = (Get-FileHash "librefang-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  librefang-${{ matrix.target }}.zip" | Out-File -Encoding ASCII "librefang-${{ matrix.target }}.zip.sha256"
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: librefang-${{ matrix.target }}.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker (linux/amd64 + linux/arm64) ────────────────────────────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/librefang/librefang:latest
            ghcr.io/librefang/librefang:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sync_homebrew:
    name: Sync to Homebrew Tap
    runs-on: ubuntu-latest
    needs: [cli]
    steps:
      - name: Check out tap repo
        uses: actions/checkout@v6
        with:
          repository: librefang/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Fetch release metadata
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            > release.json

          jq -e '.tag_name and (.assets | type == "array")' release.json >/dev/null

      - name: Generate formula
        run: |
          set -euo pipefail

          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          asset_url() {
            jq -r --arg name "$1" '.assets[] | select(.name == $name) | .browser_download_url' release.json
          }

          asset_sha() {
            jq -r --arg name "$1" '.assets[] | select(.name == $name) | (.digest // "" | sub("^sha256:"; ""))' release.json
          }

          asset_size() {
            jq -r --arg name "$1" '.assets[] | select(.name == $name) | .size' release.json
          }

          ARM64_DARWIN_NAME="librefang-aarch64-apple-darwin.tar.gz"
          X86_DARWIN_NAME="librefang-x86_64-apple-darwin.tar.gz"
          ARM64_LINUX_NAME="librefang-aarch64-unknown-linux-gnu.tar.gz"
          X86_LINUX_NAME="librefang-x86_64-unknown-linux-gnu.tar.gz"

          ARM64_DARWIN_URL="$(asset_url "$ARM64_DARWIN_NAME")"
          X86_DARWIN_URL="$(asset_url "$X86_DARWIN_NAME")"
          ARM64_LINUX_URL="$(asset_url "$ARM64_LINUX_NAME")"
          X86_LINUX_URL="$(asset_url "$X86_LINUX_NAME")"

          ARM64_DARWIN_SHA="$(asset_sha "$ARM64_DARWIN_NAME")"
          X86_DARWIN_SHA="$(asset_sha "$X86_DARWIN_NAME")"
          ARM64_LINUX_SHA="$(asset_sha "$ARM64_LINUX_NAME")"
          X86_LINUX_SHA="$(asset_sha "$X86_LINUX_NAME")"

          ARM64_DARWIN_SIZE="$(asset_size "$ARM64_DARWIN_NAME")"
          X86_DARWIN_SIZE="$(asset_size "$X86_DARWIN_NAME")"
          ARM64_LINUX_SIZE="$(asset_size "$ARM64_LINUX_NAME")"
          X86_LINUX_SIZE="$(asset_size "$X86_LINUX_NAME")"

          for required in \
            ARM64_DARWIN_URL X86_DARWIN_URL ARM64_LINUX_URL X86_LINUX_URL \
            ARM64_DARWIN_SHA X86_DARWIN_SHA ARM64_LINUX_SHA X86_LINUX_SHA \
            ARM64_DARWIN_SIZE X86_DARWIN_SIZE ARM64_LINUX_SIZE X86_LINUX_SIZE
          do
            if [ -z "${!required}" ] || [ "${!required}" = "null" ]; then
              echo "Missing release metadata: $required" >&2
              exit 1
            fi
          done

          for size_var in ARM64_DARWIN_SIZE X86_DARWIN_SIZE ARM64_LINUX_SIZE X86_LINUX_SIZE
          do
            if [ "${!size_var}" -le 0 ]; then
              echo "Release asset is empty: $size_var" >&2
              exit 1
            fi
          done

          cat > tap/Formula/librefang.rb <<EOF
          class Librefang < Formula
            desc "Community-Maintained Agent Operating System written in Rust"
            homepage "https://librefang.ai"
            license "MIT"
            version "$VERSION"

            on_macos do
              if Hardware::CPU.arm?
                url "$ARM64_DARWIN_URL"
                sha256 "$ARM64_DARWIN_SHA"
              else
                url "$X86_DARWIN_URL"
                sha256 "$X86_DARWIN_SHA"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "$ARM64_LINUX_URL"
                sha256 "$ARM64_LINUX_SHA"
              else
                url "$X86_LINUX_URL"
                sha256 "$X86_LINUX_SHA"
              end
            end

            def install
              bin.install "librefang"
            end

            test do
              system "#{bin}/librefang", "--version"
            end
          end
          EOF

          cat tap/Formula/librefang.rb

      - name: Commit and push
        working-directory: tap
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "chore: update formula to ${{ github.ref_name }}" || echo "No changes"
          git push

  sync_installers:
    name: Sync Installers to Website
    runs-on: ubuntu-latest
    needs: [cli]
    steps:
      - name: Check out source repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          path: source

      - name: Check out website repo
        uses: actions/checkout@v6
        with:
          repository: librefang/librefang-website
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          path: website

      - name: Fetch release metadata
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            > release.json

          jq -e '.tag_name and (.assets | type == "array")' release.json >/dev/null

      - name: Sync install scripts
        run: |
          cp source/scripts/install.sh website/install.sh
          cp source/scripts/install.ps1 website/install.ps1

      - name: Generate install manifest
        env:
          TAG: ${{ github.ref_name }}
        run: |
          jq \
            --arg repo "${{ github.repository }}" \
            --arg tag "$TAG" \
            '
            def artifact_for($target; $ext):
              .assets[]
              | select(.name == ("librefang-" + $target + "." + $ext))
              | {
                  name,
                  target: $target,
                  archive: $ext,
                  url: .browser_download_url,
                  checksum_url: (.browser_download_url + ".sha256")
                };

            {
              repo: $repo,
              version: $tag,
              published_at: .published_at,
              generated_from: ("https://github.com/" + $repo + "/releases/tag/" + $tag),
              channels: {
                stable: $tag
              },
              installers: {
                shell: "/install.sh",
                powershell: "/install.ps1"
              },
              assets: {
                "x86_64-unknown-linux-gnu": artifact_for("x86_64-unknown-linux-gnu"; "tar.gz"),
                "aarch64-unknown-linux-gnu": artifact_for("aarch64-unknown-linux-gnu"; "tar.gz"),
                "x86_64-apple-darwin": artifact_for("x86_64-apple-darwin"; "tar.gz"),
                "aarch64-apple-darwin": artifact_for("aarch64-apple-darwin"; "tar.gz"),
                "x86_64-pc-windows-msvc": artifact_for("x86_64-pc-windows-msvc"; "zip"),
                "aarch64-pc-windows-msvc": artifact_for("aarch64-pc-windows-msvc"; "zip")
              }
            }
            ' release.json > website/install-manifest.json

          cat website/install-manifest.json

      - name: Commit and push
        working-directory: website
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add install.sh install.ps1 install-manifest.json
          git commit -m "chore: sync installers for ${{ github.ref_name }}" || echo "No changes"
          git push
