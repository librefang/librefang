name: Heartbeat

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ping:
    name: Keep Render alive
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -sf --max-time 10 https://render.librefang.ai/api/health
