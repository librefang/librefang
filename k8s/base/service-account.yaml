# BossFang pod identity.
#
# Annotated for Workload Identity binding to a GCP service account if
# the cluster has it enabled (recommended for pulling images from
# Artifact Registry without a static credential). The actual GSA
# binding is set in the overlay so the base stays cluster-agnostic.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bossfang
  namespace: bossfang
  labels:
    app.kubernetes.io/name: bossfang
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: bossfang
