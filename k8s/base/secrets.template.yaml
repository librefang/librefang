# TEMPLATE ONLY — DO NOT COMMIT POPULATED VALUES.
#
# Copy this file to overlays/production-gke/secrets.yaml, fill in real
# values, and reference it under `resources:` in the overlay's
# kustomization.yaml. The `.gitignore` at k8s/.gitignore blocks
# overlays/*/secrets.yaml from being committed.
#
# Migration path to Sealed Secrets / External Secrets / GCP Secret
# Manager is a separate workstream; this raw Secret is the starting
# point.
#
# All values in `stringData` are base64-encoded by the Kubernetes API
# when stored. The `BOSSFANG_VAULT_KEY` value must be base64-encoded by
# YOU first (because the binary base64-decodes it at boot to 32 raw
# bytes — see crates/librefang-extensions/src/vault.rs).
apiVersion: v1
kind: Secret
metadata:
  name: bossfang-secrets
  namespace: bossfang
  labels:
    app.kubernetes.io/name: bossfang
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: bossfang
type: Opaque
stringData:
  # SurrealDB credentials. Both keys are consumed by surrealdb-statefulset
  # (to bootstrap the root user) and bossfang-deployment (to authenticate).
  SURREAL_USER: "root"
  SURREAL_PASS: "REPLACE_ME_long_random_password"

  # BossFang vault key. Must base64-decode to EXACTLY 32 bytes.
  # Generate with: openssl rand -base64 32  (yields 44 chars)
  # The legacy LIBREFANG_VAULT_KEY env var also works as a fallback.
  BOSSFANG_VAULT_KEY: "REPLACE_ME_with_openssl_rand_base64_32_output"

  # LLM provider keys. Only set the ones you actually need; the daemon
  # works without them but agents that depend on a specific provider
  # will fail until that key is present (vault or env, this is the env
  # path).
  ANTHROPIC_API_KEY: "REPLACE_OR_DELETE"
  OPENAI_API_KEY: "REPLACE_OR_DELETE"
  GROQ_API_KEY: "REPLACE_OR_DELETE"
  GEMINI_API_KEY: "REPLACE_OR_DELETE"
