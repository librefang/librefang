# HTTPRoutes for BossFang.
#
# Two routes matching the cluster-wide pattern (see argocd, docuseal):
#   1. HTTP -> HTTPS redirect on the `http` listener
#   2. HTTPS backend proxy on the `https` listener
#
# Both reference `bossfang-gateway` in `envoy-gateway-system`.
# Cross-namespace attachment works because the Gateway's listeners use
# `allowedRoutes.namespaces.from: All`.
#
# TLS terminates at the Gateway listener using `prometheusags-wildcard-tls`
# (already in envoy-gateway-system). No cert management needed here.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bossfang-http-redirect
  namespace: bossfang
  labels:
    app.kubernetes.io/name: bossfang
    app.kubernetes.io/component: route
    app.kubernetes.io/part-of: bossfang
spec:
  hostnames:
    - "bossfang.prometheusags.ai"
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: bossfang-gateway
      namespace: envoy-gateway-system
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bossfang
  namespace: bossfang
  labels:
    app.kubernetes.io/name: bossfang
    app.kubernetes.io/component: route
    app.kubernetes.io/part-of: bossfang
spec:
  hostnames:
    - "bossfang.prometheusags.ai"
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: bossfang-gateway
      namespace: envoy-gateway-system
      sectionName: https
  rules:
    # Agent endpoints — LLM calls can take longer than Envoy's default timeout.
    # Zero timeouts cover the sync /message endpoint, SSE /message/stream, and
    # the streaming WebSocket /ws. Must appear before the catch-all rule.
    - matches:
        - path:
            type: PathPrefix
            value: /api/agents/
      backendRefs:
        - name: bossfang
          port: 4545
      timeouts:
        request: 0s
        backendRequest: 0s
    # WebSocket terminal — disable all timeouts so Envoy does not tear down
    # the HTTP/1.1 Upgrade connection. Must appear before the catch-all rule.
    - matches:
        - path:
            type: PathPrefix
            value: /api/terminal/ws
      backendRefs:
        - name: bossfang
          port: 4545
      timeouts:
        request: 0s
        backendRequest: 0s
    # All other routes (API, dashboard SPA)
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: bossfang
          port: 4545
