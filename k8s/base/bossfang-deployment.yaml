# BossFang daemon Deployment.
#
# Single replica. The daemon takes an exclusive `daemon.lock` on its
# data directory at boot (see crates/librefang-cli/src/main.rs); a
# second replica would crash-loop on the lock contention. Multi-replica
# HA is a separate effort (leader election or sharded sessions).
#
# Entrypoint is `librefang start --foreground` via the existing
# Dockerfile + deploy/docker-entrypoint.sh. PORT env is honored by
# the entrypoint shim and overrides `api_listen`; we leave PORT unset
# and let the config.toml's api_listen drive things.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bossfang
  namespace: bossfang
  labels:
    app.kubernetes.io/name: bossfang
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: bossfang
spec:
  replicas: 1
  strategy:
    # Recreate so the old pod releases daemon.lock before the new one
    # tries to acquire it. RollingUpdate would deadlock on the lock.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: bossfang
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bossfang
        app.kubernetes.io/component: app
        app.kubernetes.io/part-of: bossfang
    spec:
      serviceAccountName: bossfang
      terminationGracePeriodSeconds: 60
      initContainers:
        # Wait for SurrealDB to be reachable before starting BossFang.
        # Without this the daemon races against an empty Service
        # endpoint at first boot and crash-loops twice before retries
        # win.
        - name: wait-for-surrealdb
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              echo "Waiting for surrealdb:8000..."
              until nc -z surrealdb 8000; do
                sleep 2
              done
              echo "SurrealDB reachable."
        # NOTE (phase 9 / C-009): the old `init-config` initContainer that
        # copied config.toml onto the writable PVC is GONE. Runtime-mutable
        # configuration (MCP server registrations, default-model/provider) now
        # persists to the SurrealDB config store on the PVC, not config.toml —
        # so config.toml is mounted read-only directly from the ConfigMap below.
        # The web UI no longer writes config.toml for those paths (no more
        # `os error 30`). See k8s/README.md and the C-008 import runbook;
        # the import MUST have run before this revert (assessment R-1).
      containers:
        - name: bossfang
          # Pinned in overlay. Build & push from this repo's root
          # Dockerfile to your Artifact Registry path.
          image: PLACEHOLDER_BOSSFANG_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4545
              protocol: TCP
          env:
            # Tell the daemon to put all of $HOME state here. The PVC mounts
            # at /data and holds runtime state — the SurrealDB embedded store
            # (config + memory + audit), workspaces, the vault, and npm/uv
            # caches (/data/.npm, /data/.cache/uv) for npx/uvx stdio MCP pkgs.
            # config.toml is mounted read-only at /data/config.toml from the
            # ConfigMap (baseline defaults); runtime config changes go to the
            # DB store, not the file.
            - name: BOSSFANG_HOME
              value: /data
            # The pod is only reachable through Envoy Gateway, which
            # enforces TLS and network-level access control. Skip the
            # daemon's own no-auth guard so it can bind on 0.0.0.0:4545.
            - name: LIBREFANG_ALLOW_NO_AUTH
              value: "1"
            # SurrealDB password the config.toml's password_env points at.
            - name: SURREAL_PASS
              valueFrom:
                secretKeyRef:
                  name: bossfang-secrets
                  key: SURREAL_PASS
            # Vault master key. Must base64-decode to 32 bytes.
            - name: BOSSFANG_VAULT_KEY
              valueFrom:
                secretKeyRef:
                  name: bossfang-secrets
                  key: BOSSFANG_VAULT_KEY
            # LLM provider keys — sourced from the same Secret. Missing
            # keys are OK (the daemon just can't talk to those providers
            # until they're set); kustomize won't error on a missing
            # `optional: true` key reference.
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bossfang-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bossfang-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bossfang-secrets
                  key: GROQ_API_KEY
                  optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bossfang-secrets
                  key: GEMINI_API_KEY
                  optional: true
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            # First boot runs SurrealDB migrations; allow time.
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /data
            # config.toml is mounted READ-ONLY from the ConfigMap, overlaying
            # the PVC at /data/config.toml (subPath = single-file mount). It is
            # the baseline-defaults source only; the daemon never writes it —
            # runtime config (MCP servers, default-model) persists to the DB
            # store on the PVC. subPath means ConfigMap edits need a pod restart
            # to take effect (fine for baseline defaults).
            - name: config
              mountPath: /data/config.toml
              subPath: config.toml
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: bossfang-data
        # Baseline config.toml, mounted read-only into the main container above.
        - name: config
          configMap:
            name: bossfang-config
            items:
              - key: config.toml
                path: config.toml
---
# Sibling PVC for BossFang's BOSSFANG_HOME. Kept in the Deployment file
# rather than a separate `volumeClaimTemplates` because Deployment does
# not support volumeClaimTemplates the way StatefulSet does.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bossfang-data
  namespace: bossfang
  labels:
    app.kubernetes.io/name: bossfang
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: bossfang
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: bossfang-immediate
  resources:
    requests:
      storage: 10Gi
