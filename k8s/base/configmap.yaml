# BossFang config.toml fragment.
#
# Mounted as a projected volume at /data/config.toml inside the pod.
# `BOSSFANG_HOME=/data` env var (set on the Deployment) makes the
# daemon read this file at boot.
#
# Source of truth for the schema is `KernelConfig` in
# crates/librefang-types/src/config/mod.rs and `StorageConfig` in
# crates/librefang-storage/src/config.rs.
#
# Anything secret (SURREAL_PASS, BOSSFANG_VAULT_KEY, provider API keys)
# is sourced from env vars (see secrets.template.yaml) — NEVER inline
# in this ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: bossfang-config
  namespace: bossfang
  labels:
    app.kubernetes.io/name: bossfang
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: bossfang
data:
  config.toml: |
    # Listen on all interfaces inside the pod; the Service routes ingress.
    api_listen = "0.0.0.0:4545"

    # Trust Envoy Gateway's X-Forwarded-Proto header so session cookies
    # get the Secure attribute under HTTPS. The GKE pod CIDR is not
    # static, so we trust all cluster-internal peers; this is safe because
    # the Service is only reachable through Envoy Gateway, not the internet.
    trusted_proxies = ["0.0.0.0/0"]
    trust_forwarded_for = true

    # External auth proxy posture. Envoy Gateway fronts this daemon with an
    # HTTP Basic Auth SecurityPolicy (see k8s/base/security-policy.yaml) —
    # every request is authenticated at the edge before it reaches port 4545.
    # Setting this true records that a reverse proxy handles authentication,
    # makes `require_auth_for_reads = false` honour-able, and silences the
    # boot-time non-loopback posture warning. The daemon itself still runs
    # without an in-tree api_key (LIBREFANG_ALLOW_NO_AUTH=1 on the Deployment);
    # Envoy is the gate. See crates/librefang-api/src/server.rs (~L1471).
    external_auth_proxy = true

    # Agent WebSocket origin allowlist. Prevents cross-site WebSocket
    # hijacking (#3731). Must include the dashboard hostname so the Chat
    # page can upgrade to wss://bossfang.prometheusags.ai/api/agents/*/ws.
    cors_origin = ["https://bossfang.prometheusags.ai"]

    # Storage: remote SurrealDB in the same namespace.
    # StorageBackendKind uses #[serde(tag = "kind")] so the backend variant
    # and its fields must be in the same [storage.backend] table — not a
    # separate [storage.remote] section and not a plain string.
    [storage]
    namespace = "bossfang"
    database = "main"

    [storage.backend]
    kind = "remote"
    url = "ws://surrealdb:8000"
    namespace = "bossfang"
    database = "main"
    username = "root"
    password_env = "SURREAL_PASS"
    tls_skip_verify = false

    # Optional: structured logging level. Default `info`.
    [telemetry]
    log_level = "info"

    # Terminal WebSocket: allow remote connections from the dashboard origin.
    # allow_unauthenticated_remote is required because the daemon has no
    # in-tree api_key — authentication is enforced one layer out by the Envoy
    # Gateway Basic Auth SecurityPolicy (k8s/base/security-policy.yaml), so any
    # connection that reaches this listener has already passed the edge gate.
    [terminal]
    allow_remote = true
    allow_unauthenticated_remote = true
    allowed_origins = ["https://bossfang.prometheusags.ai"]
