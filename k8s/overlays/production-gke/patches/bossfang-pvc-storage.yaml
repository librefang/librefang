# Pin bossfang-data PVC to bossfang-immediate (pd-ssd, Immediate, Retain)
# so /data (workspaces, vault, skills, config.toml, MCP package caches)
# lands on fast SSD storage that binds without WaitForFirstConsumer
# zone-scheduling risk.
#
# Size: 20Gi to accommodate:
#   - agent workspaces, vault, skills, config.toml  (~few hundred MB)
#   - npm cache (/data/.npm) for npx stdio MCP server packages
#   - uv cache (/data/.cache/uv) for uvx Python MCP server packages
#   - future MCP server growth
#
# GKE supports online PVC expansion for pd.csi.storage.gke.io; the resize
# takes effect without a pod restart (filesystem expands live).
#
# MIGRATION for storage-class change (not needed for size-only increase):
#   1. kubectl scale deployment/bossfang --replicas=0 -n bossfang
#   2. kubectl delete pvc bossfang-data -n bossfang
#   3. kubectl apply -k k8s/overlays/production-gke
#   4. kubectl scale deployment/bossfang --replicas=1 -n bossfang
# Back up /data contents first if vault or agent state matters.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bossfang-data
spec:
  storageClassName: bossfang-immediate
  resources:
    requests:
      storage: 20Gi
