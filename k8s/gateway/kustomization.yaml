apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# This component is applied SEPARATELY before the main overlay because
# the Gateway must live in envoy-gateway-system, not the bossfang namespace.
#
# Apply order:
#   1. kubectl apply -k k8s/gateway/
#   2. kubectl apply -k k8s/overlays/production-gke/
namespace: envoy-gateway-system

resources:
  - bossfang-gateway.yaml
