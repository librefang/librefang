[package]
name = "librefang-llm-drivers"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Concrete LLM provider drivers (anthropic, openai, gemini, …) implementing the librefang-llm-driver trait"
readme = "README.md"

[features]
default = []
## Enables the UAR (Universal Agent Runtime) driver which wraps liter-llm's
## unified `provider/model` client for 142+ providers. Off-by-default to keep
## the dependency tree small for builds that do not need it.
uar-driver = ["dep:universal-agent-runtime"]

[dependencies]
# UAR — optional; only compiled when the `uar-driver` feature is enabled.
#
# Notes:
# * `default-features = false` keeps Postgres (`postgres-backend` → `sqlx` →
#   `libsqlite3-sys`) and the MemPalace knowledge graph (`memory-palace` →
#   `mempalace-core` → bundled `rusqlite`) out of the build, both of which
#   conflict with librefang's own `rusqlite`/`libsqlite3-sys` versions.
# * `surreal-backend` is enabled explicitly so UAR uses embedded SurrealDB
#   (RocksDB) for persistence — fully self-contained, no external services.
# * 2026-06-01 update: GQAdonis fork synced to Prometheus-AGS 745b4c1 with fixed
#   .gitmodules (SCP SSH URLs -> HTTPS so libgit2 can parse them). Branch
#   sync-gqadonis-745b4c1 == Prometheus-AGS 745b4c1 + one .gitmodules fix commit.
#   surreal-memory pinned at 7072370 in both workspaces. kreuzberg now public HTTPS
#   (kreuzberg-dev/kreuzberg tag v4.9.8), no SSH source redirect needed.
#   See: https://github.com/GQAdonis/universal-agent-runtime/tree/sync-gqadonis-745b4c1
universal-agent-runtime = { git = "https://github.com/GQAdonis/universal-agent-runtime.git", branch = "sync-gqadonis-745b4c1", optional = true, default-features = false, features = ["surreal-backend"] }

librefang-types = { path = "../librefang-types" }
librefang-llm-driver = { path = "../librefang-llm-driver" }
librefang-http = { path = "../librefang-http" }
reqwest = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
opentelemetry = { workspace = true }
opentelemetry-http = { workspace = true }
tracing-opentelemetry = { workspace = true }
metrics = { workspace = true }
futures = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
base64 = { workspace = true }
dashmap = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
zeroize = { workspace = true }
dirs = { workspace = true }
rand = { workspace = true }

[dev-dependencies]
serial_test = "3"
tempfile = { workspace = true }
wiremock = "0.6"
opentelemetry_sdk = { workspace = true }
tracing-subscriber = { workspace = true }

[lints]
workspace = true
