# LibreFang Agent OS configuration
# See https://github.com/librefang/librefang for documentation

# For Docker, change to "0.0.0.0:4545" or set LIBREFANG_LISTEN env var.
api_listen = "0.0.0.0:4545"

[default_model]
provider = "{{provider}}"
model = "{{model}}"
api_key_env = "{{api_key_env}}"

[memory]
decay_rate = 0.05

# Proactive memory (mem0-style auto-memorize / auto-retrieve)
[proactive_memory]
enabled = true
auto_memorize = true
auto_retrieve = true
max_retrieve = 10
# extraction_model = ""  # defaults to your default_model
# extraction_threshold = 0.7
# session_ttl_hours = 24
# duplicate_threshold = 0.5
# confidence_decay_rate = 0.01
# max_memories_per_agent = 1000

# Regional endpoint selection for multi-region providers.
# [provider_regions]
# qwen = "intl"        # Use Qwen international endpoint
# minimax = "china"    # Use MiniMax China endpoint (MINIMAX_CN_API_KEY)
