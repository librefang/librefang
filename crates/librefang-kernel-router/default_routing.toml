# Default template routing rules for the LibreFang kernel router.
#
# This file is embedded into the binary at compile time (include_str!) and is
# the single source of truth for the built-in specialist routes.
#
# Operators override it by placing a routing.toml at
#   $LIBREFANG_HOME/registry/templates/routing.toml
# Entries merge by `target`:
#   - same target  → overrides the default rule
#   - new target   → appends a new rule
#   - enabled=false → removes the default rule from routing
# Edits to the override file take effect on `POST /api/config/reload` or a
# daemon restart; the rule set is cached and not hot-reloaded on file change
# alone.
# A rule with an invalid regex (or an unparseable file) is skipped with a WARN;
# routing never fails closed on a bad pattern.
#
# Each rule scores a message: a `strong` hit weighs 6 (explicit-alias weight),
# a `weak` hit weighs 1. Regex values are matched case-insensitively.

[[template]]
target = "hello-world"
strong = [
  { label = "hello", regex = '\bhello\b|\bhi\b|\bhey\b|\bgreet\b|\bwelcome\b' },
  { label = "打招呼", regex = '打个招呼|欢迎词|自我介绍|介绍你自己|你好' },
]

[[template]]
target = "coder"
strong = [
  { label = "implement", regex = '\bimplement\b|\bbuild\b|\brefactor\b|\bpatch\b' },
  { label = "写代码", regex = '写代码|实现功能|补丁|脚本|编码|重构|开发' },
]
weak = [
  { label = "code", regex = '\bcode\b|\bfunction\b|\bapi\b' },
  { label = "代码", regex = '代码|程序|模块|接口' },
]

