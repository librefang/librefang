    <script>
      // Load CJK font based on detected language
      (function() {
        var fontMap = { 'zh': 'Noto+Sans+SC', 'zh-TW': 'Noto+Sans+TC', 'ja': 'Noto+Sans+JP', 'ko': 'Noto+Sans+KR' };
        var lang = window.__INITIAL_LANG__ || 'en';
        var font = fontMap[lang];
        if (font) {
          var link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = 'https://fonts.googleapis.com/css2?family=' + font + ':wght@400;500;700;900&display=swap';
          document.head.appendChild(link);
        }
      })();
    </script>
    <title>LibreFang - The Agent Operating System</title>
    <script>
      (function() {
        var lang = 'en';
        var path = window.location.pathname;
        if (path.startsWith('/zh-TW')) lang = 'zh-TW';
        else if (path.startsWith('/zh')) lang = 'zh';
        else if (path.startsWith('/de')) lang = 'de';
        else if (path.startsWith('/ja')) lang = 'ja';
        else if (path.startsWith('/ko')) lang = 'ko';
        else if (path.startsWith('/es')) lang = 'es';
        document.documentElement.lang = lang;
        window.__INITIAL_LANG__ = lang;
      })();
    </script>
  </head>
