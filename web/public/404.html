<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found | LibreFang</title>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background: #070b14; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .container { text-align: center; max-width: 480px; padding: 2rem; }
    h1 { font-size: 6rem; font-weight: 900; color: #06b6d4; margin: 0; line-height: 1; }
    p { color: #6b7280; font-size: 1.125rem; margin: 1.5rem 0; }
    a { display: inline-block; padding: 0.75rem 1.5rem; background: #06b6d4; color: #070b14; font-weight: 700; border-radius: 4px; text-decoration: none; transition: background 0.2s; }
    a:hover { background: #22d3ee; }
    .mono { font-family: 'JetBrains Mono', monospace; color: #06b6d4; font-size: 0.875rem; margin-bottom: 2rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <div class="mono">$ librefang find page --not-found</div>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
