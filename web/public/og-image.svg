<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#070b14"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#0f1729" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6"/>

  <!-- Left side content -->
  <text x="80" y="240" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="bold" fill="#ffffff">LibreFang</text>
  <text x="80" y="300" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#06b6d4">The Agent Operating System</text>
  <text x="80" y="360" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#64748b">Built in Rust | 15 Hands | 44 Channels | 49 Providers</text>

  <!-- Right side terminal box -->
  <rect x="700" y="180" width="420" height="220" rx="12" fill="#0d1424" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Terminal title bar -->
  <rect x="700" y="180" width="420" height="40" rx="12" fill="#111b2e"/>
  <rect x="700" y="208" width="420" height="12" fill="#111b2e"/>
  <circle cx="724" cy="200" r="6" fill="#f87171" opacity="0.8"/>
  <circle cx="746" cy="200" r="6" fill="#fbbf24" opacity="0.8"/>
  <circle cx="768" cy="200" r="6" fill="#34d399" opacity="0.8"/>
  <text x="910" y="205" font-family="monospace" font-size="13" fill="#475569" text-anchor="middle">terminal</text>

  <!-- Terminal content -->
  <text x="728" y="264" font-family="'Courier New', Courier, monospace" font-size="18" fill="#64748b">$</text>
  <text x="748" y="264" font-family="'Courier New', Courier, monospace" font-size="18" fill="#06b6d4"> librefang start</text>

  <text x="728" y="298" font-family="'Courier New', Courier, monospace" font-size="14" fill="#34d399">&#x2713; Kernel booted</text>
  <text x="728" y="322" font-family="'Courier New', Courier, monospace" font-size="14" fill="#34d399">&#x2713; 15 hands loaded</text>
  <text x="728" y="346" font-family="'Courier New', Courier, monospace" font-size="14" fill="#34d399">&#x2713; Listening on :4545</text>
  <text x="728" y="378" font-family="'Courier New', Courier, monospace" font-size="14" fill="#64748b">&#x2588;</text>

  <!-- Bottom accent line -->
  <rect x="80" y="560" width="200" height="3" rx="1.5" fill="#06b6d4" opacity="0.6"/>

  <!-- URL -->
  <text x="80" y="590" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">librefang.ai</text>
</svg>
