app = "librefang"
primary_region = "nrt"

[build]
image = "ghcr.io/librefang/librefang:latest"

[env]
  LIBREFANG_HOME = "/data"
  LIBREFANG_LISTEN = "0.0.0.0:4545"
  # Public live demo: intentionally open. Replace with LIBREFANG_API_KEY for private deployments.
  LIBREFANG_ALLOW_NO_AUTH = "1"

[http_service]
  internal_port = 4545
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "librefang_data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
