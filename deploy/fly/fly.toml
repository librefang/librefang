app = "librefang"
primary_region = "nrt"

[build]
image = "ghcr.io/librefang/librefang:latest"

[env]
  LIBREFANG_HOME = "/data"
  LIBREFANG_LISTEN = "0.0.0.0:4545"
  # SAFETY: this template is safe-by-default. The auth middleware will fail-closed
  # for non-loopback requests when no LIBREFANG_API_KEY is configured.
  #
  # For the canonical librefang/librefang public demo at flyio.librefang.ai,
  # the maintainer sets LIBREFANG_ALLOW_NO_AUTH=1 via `flyctl secrets set` AFTER deploy
  # — NOT in this committed file. See deploy.sh for the API-key generation flow.

[http_service]
  internal_port = 4545
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "librefang_data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
