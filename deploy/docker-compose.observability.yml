name: librefang

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: librefang-otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC receiver (LibreFang's otlp_endpoint)
      - "4318:4318"   # OTLP HTTP receiver
      - "8889:8889"   # Prometheus scrape endpoint (OTLP metrics → Prometheus)
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - tempo
      - jaeger
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: librefang-jaeger
    # 16686 is the Jaeger UI. The OTLP receiver on 4317 stays internal —
    # the host's 4317 is the otel-collector; collector forwards to
    # jaeger:4317 over the docker bridge.
    ports:
      - "16686:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

  tempo:
    image: grafana/tempo:latest
    container_name: librefang-tempo
    # 3200 (HTTP query API) is exposed so Grafana's Tempo datasource can
    # reach it through the Docker network. Tempo's OTLP receiver on 4317
    # is NOT exposed to the host — the host's 4317 is the OTel collector;
    # the collector forwards traces to tempo:4317 internally.
    ports:
      - "3200:3200"
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: librefang-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - otel-collector
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: librefang-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo
    restart: unless-stopped

volumes:
  prometheus-data:
  tempo-data:
  grafana-data:
