apiVersion: v1
kind: ServiceAccount
metadata:
  name: librefang-backup
  namespace: librefang
  labels:
    app: librefang
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: librefang-backup
  namespace: librefang
  labels:
    app: librefang
rules:
  - apiGroups: [""]
    resources: ["pods/exec", "pods"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: librefang-backup
  namespace: librefang
  labels:
    app: librefang
subjects:
  - kind: ServiceAccount
    name: librefang-backup
    namespace: librefang
roleRef:
  kind: Role
  name: librefang-backup
  apiGroup: rbac.authorization.k8s.io
