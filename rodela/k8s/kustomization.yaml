apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: librefang

resources:
  - namespace.yaml
  - rbac-backup.yaml
  - statefulset.yaml
  - service.yaml
  - pvc-backup.yaml
  - cronjob-backup.yaml
  # - ingress.yaml  # uncomment when cluster has an ingress controller

configMapGenerator:
  - name: librefang-config
    files:
      - config/config.toml
      - config/aliases.toml
    # Channel, provider, and integration TOML files are added here
    # after running scripts/k8s-migrate-from-rpi.sh, which populates
    # config/channels/, config/providers/, config/integrations/.

secretGenerator:
  - name: librefang-secrets
    envs:
      - secrets.env

generatorOptions:
  disableNameSuffixHash: false
  # Hash suffix on ConfigMap/Secret names drives automatic pod rollout
  # when config changes. Edit config/*, commit, kubectl apply -k deploy/k8s.
